<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - tix.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="auth-page">
        <div class="nav-brand" style="text-align:center;margin-bottom:1.5rem;font-size:24px">tix<span class="brand-dot">.</span></div>
        <h1>Register</h1>
        {% if let Some(err) = error %}
        <div class="alert alert-error">{{ err }}</div>
        {% endif %}
        <form method="post" action="/register">
            <label>Username
                <input type="text" name="username" required autofocus>
            </label>
            <label>Email
                <input type="email" name="email" required>
            </label>
            <label>Password
                <input type="password" name="password" required minlength="4">
            </label>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Register</button>
        </form>
        <p>Already have an account? <a href="/login">Login</a></p>
    </main>
</body>
</html>

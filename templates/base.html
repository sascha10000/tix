<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ticket System{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="/" class="nav-brand">tix<span class="brand-dot">.</span></a>
            <div class="nav-sep"></div>
            <a href="/projects">Projects</a>
            {% if user.is_admin() %}
            <a href="/admin/users">Users</a>
            <a href="/admin/statuses">Statuses</a>
            <a href="/admin/ticket-types">Types</a>
            {% endif %}
        </div>
        <div class="nav-right">
            <a href="/profile" class="nav-user">{{ user.username }}{% if user.is_admin %} <span class="nav-role">admin</span>{% endif %}</a>
            <form method="post" action="/logout" style="display:inline">
                <button type="submit" class="btn btn-sm btn-ghost">Logout</button>
            </form>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="{{ t.lang_code }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ticket System{% endblock %}</title>
    <script>document.documentElement.dataset.theme=localStorage.getItem("theme")||"dark";</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="/" class="nav-brand">tix<span class="brand-dot">.</span></a>
            <div class="nav-sep"></div>
            <a href="/projects">{{ t.nav.projects }}</a>
            {% if user.is_admin() %}
            <a href="/admin/users">{{ t.nav.users }}</a>
            <a href="/admin/statuses">{{ t.nav.statuses }}</a>
            <a href="/admin/ticket-types">{{ t.nav.types }}</a>
            {% endif %}
        </div>
        <div class="nav-right">
            <button class="theme-toggle" onclick="(function(){var t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;localStorage.setItem('theme',t)})()" aria-label="{{ t.nav.toggle_theme }}">
                <svg class="theme-icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg class="theme-icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
            <div class="nav-sep"></div>
            <a href="/profile" class="nav-user">{{ user.username }}{% if user.is_admin %} <span class="nav-role">{{ t.nav.admin_role }}</span>{% endif %}</a>
            <form method="post" action="/logout" style="display:inline">
                <button type="submit" class="btn btn-sm btn-ghost">{{ t.nav.logout }}</button>
            </form>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>

{% extends "base.html" %}

{% block title %}{{ t.admin.users.edit_title }}{% endblock %}

{% block content %}
<h1>{{ t.admin.users.edit_title }}: {{ edit_user.username }}</h1>
<form method="post" action="/admin/users/{{ edit_user.id }}/edit">
    <label>{{ t.admin.users.username }} <input type="text" name="username" value="{{ edit_user.username }}" required></label>
    <label>{{ t.admin.users.email }} <input type="email" name="email" value="{{ edit_user.email }}" required></label>
    <label>
        <input type="checkbox" name="is_admin" {% if edit_user.is_admin %}checked{% endif %}>
        {{ t.admin.users.admin_label }}
    </label>
    <label>
        <input type="checkbox" name="is_manager" {% if edit_user.is_manager %}checked{% endif %}>
        {{ t.admin.users.manager_label }}
    </label>
    <label>
        <input type="checkbox" name="is_active" {% if edit_user.is_active %}checked{% endif %}>
        {{ t.admin.users.active_label }}
    </label>
    <button type="submit" class="btn btn-primary">{{ t.common.save }}</button>
    <a href="/admin/users" class="btn">{{ t.common.cancel }}</a>
</form>
{% endblock %}

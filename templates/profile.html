{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
<h1>Profile</h1>

{% if let Some(msg) = success %}
<div class="alert alert-success">{{ msg }}</div>
{% endif %}
{% if let Some(err) = error %}
<div class="alert alert-error">{{ err }}</div>
{% endif %}

<h2>Account</h2>
<form method="post" action="/profile">
    <label>Username <input type="text" name="username" value="{{ profile.username }}" required></label>
    <label>Email <input type="email" name="email" value="{{ profile.email }}" required></label>
    <button type="submit" class="btn btn-primary">Save</button>
</form>

<h2>Change Password</h2>
<form method="post" action="/profile/password">
    <label>Current Password <input type="password" name="current_password" required></label>
    <label>New Password <input type="password" name="new_password" required minlength="4"></label>
    <button type="submit" class="btn btn-primary">Change Password</button>
</form>
{% endblock %}
